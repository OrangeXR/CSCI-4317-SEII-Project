{% extends "0-base.html" %}
{% block content %}
<h1>Assignments</h1>
{% include '0-menu.html' %}  

<ul>
  
{% for a, tag in assignments %}
    <li class="{{ tag }}">
        <strong>{{ a[3] }}</strong> {{ a[2] }} - {{ a[4] }} — due {{ a[5] }}

        <a href="{{ url_for('edit', assignment_id=a[0]) }}">Edit</a>
        <a href="{{ url_for('delete', assignment_id=a[0]) }}">Delete</a>
    </li>
{% endfor %}
</ul>
{% endblock %}
