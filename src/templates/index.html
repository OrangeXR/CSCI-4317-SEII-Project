{% extends "base.html" %}
{% block content %}
<h1>Assignments</h1>

<a href="{{ url_for('add') }}">Add Assignment</a>

<ul>
    {% for a in assignments %}
        <li>
            <strong>{{ a[2] }}</strong> {{ a[1] }} - {{ a[3] }} — due {{ a[4] }}


            <a href="{{ url_for('edit', assignment_id=a[0]) }}">Edit</a>
            <a href="{{ url_for('delete', assignment_id=a[0]) }}">Delete</a><br>
        </li>
    {% endfor %}
</ul>
{% endblock %}
